<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TioRes - รายการสั่งซื้อ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#00D9FF',
                        accent: '#FF6B6B',
                        success: '#22C55E',
                        dark: { 900: '#0D1117', 800: '#161B22', 700: '#21262D' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-dark-900 text-white font-['Prompt'] min-h-screen flex flex-col">
    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-dark-900/80 border-b border-white/10">
        <div class="container mx-auto px-4 py-3 flex items-center">
            <a href="index.html" class="p-2 -ml-2 hover:bg-white/10 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <h1 class="text-xl font-bold ml-4">รายการสั่งซื้อ</h1>
            <div id="table-badge" class="ml-auto px-3 py-1 bg-dark-700 rounded-full border border-white/20 text-sm">
                โต๊ะ <span id="table-name" class="font-bold">-</span>
            </div>
        </div>
    </header>

    <!-- Order Items List -->
    <main class="flex-1 container mx-auto px-4 py-6">
        <!-- Pending Orders -->
        <section id="pending-section">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-lg">รอส่งครัว</h2>
                <span id="pending-count" class="px-3 py-1 bg-accent/20 text-accent rounded-full text-sm font-medium">0
                    รายการ</span>
            </div>
            <div id="pending-list" class="space-y-3 mb-6">
                <!-- Items injected by JS -->
            </div>
        </section>

        <!-- Sent Orders -->
        <section id="sent-section" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-bold text-lg text-white/70">ส่งแล้ว</h2>
                <span id="sent-count" class="px-3 py-1 bg-success/20 text-success rounded-full text-sm font-medium">0
                    รายการ</span>
            </div>
            <div id="sent-list" class="space-y-3 opacity-60">
                <!-- Items injected by JS -->
            </div>
        </section>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20">
            <svg class="w-24 h-24 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <p class="mt-4 text-white/40 text-lg">ยังไม่มีรายการ</p>
            <a href="index.html"
                class="mt-4 px-6 py-3 bg-primary/20 text-primary rounded-xl font-medium hover:bg-primary/30 transition">
                เลือกเมนู
            </a>
        </div>
    </main>

    <!-- Bottom Action Bar -->
    <footer id="action-bar" class="hidden sticky bottom-0 bg-dark-800 border-t border-white/10 p-4">
        <div class="container mx-auto">
            <!-- Subtotal -->
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-white/60">ยอดรวม</span>
                <span class="text-2xl font-bold">฿<span id="subtotal">0</span></span>
            </div>

            <!-- Send Button -->
            <button id="send-btn" onclick="sendOrders()"
                class="w-full py-4 bg-gradient-to-r from-success to-success/80 text-white rounded-2xl font-bold text-lg shadow-lg shadow-success/30 hover:shadow-success/50 transition-all flex items-center justify-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
                ส่งออเดอร์ไปครัว
            </button>

            <!-- Check Bill Link -->
            <a href="bill.html" class="block mt-3 text-center text-white/60 hover:text-white transition">
                ดูบิลทั้งหมด →
            </a>
        </div>
    </footer>

    <!-- Sending Modal -->
    <div id="sending-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80">
        <div class="text-center">
            <div class="w-20 h-20 border-4 border-success border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-6 text-xl font-medium">กำลังส่งออเดอร์...</p>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-dark-800 rounded-2xl p-8 text-center max-w-sm mx-4 border border-success/30">
            <div class="w-20 h-20 bg-success/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold mb-2">ส่งสำเร็จ!</h3>
            <p class="text-white/60 mb-6">ออเดอร์ถูกส่งไปที่ครัวแล้ว</p>
            <button onclick="closeSuccessModal()"
                class="w-full py-3 bg-success text-dark-900 rounded-xl font-bold">ตกลง</button>
        </div>
    </div>

    <script src="js/app.js?v=20260118"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            TioRes.initOrdersPage();
        });
    </script>
</body>

</html>
