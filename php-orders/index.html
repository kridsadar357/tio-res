<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สั่งอาหาร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#00D9FF',
                        accent: '#FF6B6B',
                        success: '#22C55E',
                        dark: { 900: '#0D1117', 800: '#161B22', 700: '#21262D', 600: '#30363D' }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=3">
</head>

<body class="bg-dark-900 text-white font-['Prompt'] min-h-screen flex flex-col">
    <!-- Header - Store Info, Tier, Table, Language -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-dark-900/95 border-b border-white/10">
        <div class="container mx-auto px-4 py-3">
            <!-- Top row: Store name + Language + Table badge -->
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                    <div id="store-logo"
                        class="w-10 h-10 rounded-full bg-dark-700 flex items-center justify-center overflow-hidden">
                        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <div>
                        <h1 id="store-name" class="text-lg font-bold leading-tight">ร้านอาหาร</h1>
                        <p id="tier-name" class="text-xs text-primary font-medium">บุฟเฟ่ต์</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <!-- Language Selector -->
                    <div class="relative">
                        <button id="lang-btn" onclick="TioRes.toggleLangMenu()"
                            class="flex items-center gap-1 px-3 py-2 bg-dark-700 rounded-lg border border-white/10 text-sm hover:bg-dark-600 transition">
                            <span id="lang-flag">🇹🇭</span>
                            <span id="lang-code" class="text-white/70">TH</span>
                            <svg class="w-3 h-3 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <div id="lang-menu"
                            class="hidden absolute right-0 top-full mt-1 bg-dark-800 rounded-lg border border-white/10 shadow-lg overflow-hidden z-50 min-w-[120px]">
                            <button onclick="TioRes.setLanguage('th')"
                                class="w-full px-4 py-2 text-left hover:bg-dark-700 flex items-center gap-2 text-sm">
                                <span>🇹🇭</span> ไทย
                            </button>
                            <button onclick="TioRes.setLanguage('en')"
                                class="w-full px-4 py-2 text-left hover:bg-dark-700 flex items-center gap-2 text-sm">
                                <span>🇺🇸</span> English
                            </button>
                            <button onclick="TioRes.setLanguage('cn')"
                                class="w-full px-4 py-2 text-left hover:bg-dark-700 flex items-center gap-2 text-sm">
                                <span>🇨🇳</span> 中文
                            </button>
                        </div>
                    </div>
                    <!-- Table Badge -->
                    <div id="table-badge"
                        class="px-4 py-2 bg-gradient-to-r from-primary/20 to-primary/10 rounded-xl border border-primary/30">
                        <span class="text-xs text-white/60" data-i18n="table">โต๊ะ</span>
                        <span id="table-name" class="font-bold text-primary text-lg ml-1">-</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Category Navigation - Sticky below header -->
    <nav class="sticky top-[68px] z-40 bg-dark-900/95 backdrop-blur-xl border-b border-white/5 py-2 px-4">
        <div id="category-tabs" class="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
            <button data-category="all"
                class="category-btn active whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium bg-primary text-dark-900 border-0">
                ทั้งหมด
            </button>
            <!-- Categories injected by JS -->
        </div>
    </nav>

    <!-- Menu Content -->
    <main class="flex-1 container mx-auto px-4 py-4 pb-28">
        <div id="menu-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
            <!-- Menu items injected by JS -->
        </div>

        <!-- Loading State -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-white/60">กำลังโหลดเมนู...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20">
            <svg class="w-20 h-20 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
            </svg>
            <p class="mt-4 text-white/40">ไม่พบรายการ</p>
        </div>
    </main>

    <!-- Fixed Footer - Cart Button -->
    <footer id="cart-footer" class="hidden"
        style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; padding-bottom: env(safe-area-inset-bottom, 0);">
        <div style="background: linear-gradient(to top, #0D1117 60%, transparent); padding: 16px 16px 20px 16px;">
            <a href="orders.html" class="flex items-center justify-between w-full px-5 py-4 rounded-xl shadow-lg"
                style="background: linear-gradient(to right, #00D9FF, #22D3EE);">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center"
                        style="background: rgba(255,255,255,0.2);">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                    </div>
                    <div class="text-left" style="color: #0D1117;">
                        <span id="cart-count" class="font-bold text-lg">0</span>
                        <span class="text-sm ml-1" style="opacity: 0.8;">รายการ</span>
                    </div>
                </div>
                <div class="flex items-center gap-2" style="color: #0D1117;">
                    <span class="text-xl font-bold">฿<span id="cart-total">0</span></span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </a>
        </div>
    </footer>

    <!-- Add to Cart Modal -->
    <div id="add-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm">
        <div class="bg-dark-800 rounded-3xl max-w-md w-full mx-4 overflow-hidden border border-white/10 shadow-2xl">
            <div id="modal-image" class="h-52 bg-dark-700 bg-cover bg-center relative">
                <button onclick="closeModal()"
                    class="absolute top-3 right-3 w-10 h-10 bg-black/50 rounded-full flex items-center justify-center backdrop-blur-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <h3 id="modal-name" class="text-xl font-bold mb-1">Item Name</h3>
                <p id="modal-price" class="text-2xl font-bold text-primary mb-5">฿0</p>

                <!-- Quantity -->
                <div class="flex items-center justify-center gap-8 mb-5">
                    <button onclick="changeQty(-1)"
                        class="qty-btn w-14 h-14 rounded-full bg-dark-700 text-2xl font-bold hover:bg-dark-600 active:scale-95 transition">−</button>
                    <span id="modal-qty" class="text-3xl font-bold w-16 text-center">1</span>
                    <button onclick="changeQty(1)"
                        class="qty-btn w-14 h-14 rounded-full bg-primary/20 text-primary text-2xl font-bold hover:bg-primary/30 active:scale-95 transition">+</button>
                </div>

                <!-- Notes -->
                <input type="text" id="modal-notes" placeholder="หมายเหตุ (เช่น ไม่ใส่ผัก)"
                    class="w-full px-4 py-3 bg-dark-700 rounded-xl border border-white/10 focus:border-primary outline-none mb-5 text-sm">

                <!-- Add Button -->
                <button onclick="addToCart()"
                    class="w-full py-4 bg-gradient-to-r from-primary to-cyan-400 text-dark-900 rounded-xl font-bold text-lg active:scale-98 transition shadow-lg shadow-primary/30">
                    เพิ่มลงตะกร้า
                </button>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=6"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            TioRes.init();
        });
    </script>
</body>

</html>
