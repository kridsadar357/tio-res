<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TioRes - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#00D9FF',
                        accent: '#FF6B6B',
                        dark: { 900: '#0D1117', 800: '#161B22', 700: '#21262D' }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark-900 text-white font-['Prompt'] min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-dark-900/80 border-b border-white/10">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold">
                    <span class="text-primary">Tio</span><span class="text-accent">Res</span>
                </h1>
            </div>
            <div id="table-badge" class="px-4 py-2 bg-dark-700 rounded-full border border-white/20">
                <span class="text-sm text-white/70">โต๊ะ</span>
                <span id="table-name" class="font-bold ml-1">-</span>
            </div>
        </div>
    </header>

    <!-- Buffet Tier Selector -->
    <section id="tier-section" class="hidden px-4 py-4 bg-gradient-to-r from-primary/10 to-accent/10 border-b border-white/5">
        <div class="container mx-auto">
            <p class="text-sm text-white/60 mb-2">เลือกแพ็คเกจ</p>
            <div id="tier-tabs" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <!-- Tier buttons injected by JS -->
            </div>
        </div>
    </section>

    <!-- Category Filter -->
    <section class="px-4 py-3 border-b border-white/5">
        <div id="category-tabs" class="flex gap-2 overflow-x-auto scrollbar-hide">
            <button data-category="all" class="category-btn active whitespace-nowrap px-4 py-2 rounded-full text-sm bg-primary/20 text-primary border border-primary/30">
                ทั้งหมด
            </button>
            <!-- Categories injected by JS -->
        </div>
    </section>

    <!-- Menu Grid -->
    <main class="container mx-auto px-4 py-6">
        <div id="menu-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- Menu items injected by JS -->
        </div>
        
        <!-- Loading State -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-white/60">กำลังโหลดเมนู...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20">
            <svg class="w-20 h-20 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
            </svg>
            <p class="mt-4 text-white/40">ไม่พบรายการ</p>
        </div>
    </main>

    <!-- Floating Cart Button -->
    <div id="cart-button" class="fixed bottom-6 right-6 z-50 hidden">
        <a href="orders.html" class="flex items-center gap-3 px-6 py-4 bg-gradient-to-r from-primary to-primary/80 rounded-2xl shadow-lg shadow-primary/30 hover:shadow-primary/50 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <div>
                <span id="cart-count" class="font-bold">0</span>
                <span class="text-sm opacity-80">รายการ</span>
            </div>
            <div class="ml-2 pl-3 border-l border-white/30">
                <span class="font-bold">฿<span id="cart-total">0</span></span>
            </div>
        </a>
    </div>

    <!-- Add to Cart Modal -->
    <div id="add-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-dark-800 rounded-2xl max-w-md w-full mx-4 overflow-hidden border border-white/10">
            <div id="modal-image" class="h-48 bg-dark-700 bg-cover bg-center"></div>
            <div class="p-6">
                <h3 id="modal-name" class="text-xl font-bold mb-2">Item Name</h3>
                <p id="modal-price" class="text-2xl font-bold text-primary mb-4">฿0</p>
                
                <!-- Quantity -->
                <div class="flex items-center justify-center gap-6 mb-4">
                    <button onclick="changeQty(-1)" class="w-12 h-12 rounded-full bg-dark-700 text-xl font-bold hover:bg-dark-600 transition">−</button>
                    <span id="modal-qty" class="text-2xl font-bold w-12 text-center">1</span>
                    <button onclick="changeQty(1)" class="w-12 h-12 rounded-full bg-primary/20 text-primary text-xl font-bold hover:bg-primary/30 transition">+</button>
                </div>

                <!-- Notes -->
                <input type="text" id="modal-notes" placeholder="หมายเหตุ (เช่น ไม่ใส่ผัก)" 
                       class="w-full px-4 py-3 bg-dark-700 rounded-xl border border-white/10 focus:border-primary outline-none mb-4">

                <!-- Actions -->
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-dark-700 rounded-xl font-medium hover:bg-dark-600 transition">ยกเลิก</button>
                    <button onclick="addToCart()" class="flex-1 py-3 bg-primary text-dark-900 rounded-xl font-bold hover:bg-primary/90 transition">เพิ่มลงตะกร้า</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            TioRes.init();
        });
    </script>
</body>
</html>
