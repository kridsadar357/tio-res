# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - "**/generated/**"
  errors:
    invalid_annotation_target: ignore
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  # Enable additional lint rules for better code quality
  rules:
    # Style (disabled info-level rules that generate too many messages)
    # prefer_const_constructors: true  # Info: 824 issues - too verbose
    # prefer_const_literals_to_create_immutables: true  # Info: too verbose
    # prefer_const_declarations: true  # Info: too verbose
    prefer_final_fields: true
    # prefer_final_locals: true  # Info: too verbose
    # prefer_single_quotes: true  # Info: too verbose
    # require_trailing_commas: true  # Info: too verbose
    
    # Performance
    avoid_unnecessary_containers: true
    # prefer_const_constructors_in_immutables: true  # Info: too verbose
    prefer_is_empty: true
    prefer_is_not_empty: true
    
    # Best practices
    always_declare_return_types: true
    avoid_print: true
    avoid_redundant_argument_values: true
    avoid_slow_async_io: true
    cancel_subscriptions: true
    close_sinks: true
    no_duplicate_case_values: true
    # prefer_relative_imports: true  # Info: too verbose for large projects
    use_build_context_synchronously: true
    
    # Documentation
    public_member_api_docs: false  # Optional: enable for public APIs
    
    # Null safety
    avoid_null_checks_in_equality_operators: true
    prefer_if_null_operators: true
    prefer_null_aware_operators: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
